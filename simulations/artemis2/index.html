<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artemis I &amp; II — 3D Trajectories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-bg: #f8f9fa; --clr-surface: #ffffff; --clr-text: #1f2937;
      --clr-text-muted: #6b7280; --clr-accent: #2d7d9a;
      --clr-accent-light: #d4eef4; --clr-border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --clr-bg: #2e3440; --clr-surface: #3b4252; --clr-text: #eceff4;
        --clr-text-muted: #d0d8e4; --clr-accent: #5fb3d4;
        --clr-accent-light: #2a4558; --clr-border: #4c566a;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--clr-bg); color: var(--clr-text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 24px 16px; gap: 20px;
    }
    header { text-align: center; }
    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.03em; }
    header p  { font-size: 0.85rem; color: var(--clr-text-muted); margin-top: 4px; }
    .main-layout {
      display: flex; flex-direction: column; align-items: stretch;
      gap: 20px; width: 100%; max-width: 720px;
    }
    .canvas-container {
      position: relative; width: 100%; aspect-ratio: 1/1;
      border-radius: 10px; overflow: hidden; background: #050510;
    }
    #c { display: block; width: 100%; height: 100%; cursor: grab; }
    #c:active { cursor: grabbing; }
    #hud {
      position: absolute; top: 14px; left: 14px;
      display: flex; flex-direction: column; gap: 4px; pointer-events: none;
    }
    .hl { font-family: ui-monospace, Menlo, monospace; font-size: 12px;
          color: #c8d0e0; line-height: 1.5; }
    .hl.accent  { color: #88e08c; font-weight: 600; }
    .hl.warning { color: #ffaa40; font-weight: 600; }
    .hl.muted   { color: #505870; font-size: 11px; }
    .controls {
      width: 100%; background: var(--clr-surface);
      border: 1px solid var(--clr-border); border-radius: 12px;
      padding: 18px 22px; display: flex; flex-direction: column; gap: 12px;
    }
    .section-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.10em;
      text-transform: uppercase; color: var(--clr-text-muted);
      padding-bottom: 2px; border-bottom: 1px solid var(--clr-border);
    }
    .control-row { display: flex; align-items: center; gap: 12px; }
    .control-label { font-size: 0.8rem; color: var(--clr-text-muted); width: 120px; flex-shrink: 0; }
    input[type=range] { flex: 1; accent-color: var(--clr-accent); cursor: pointer; }
    .control-value { font-size: 0.8rem; color: var(--clr-text); width: 72px;
                     text-align: right; font-variant-numeric: tabular-nums; }
    button {
      padding: 7px 14px; border: 1px solid var(--clr-accent); border-radius: 6px;
      background: transparent; color: var(--clr-text); font-family: inherit;
      font-size: 0.82rem; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    button:hover  { background: var(--clr-accent-light); }
    button.active { background: var(--clr-accent); color: #fff; }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-row button { flex: 1; }
    .fact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .fact { display: flex; flex-direction: column; gap: 1px; }
    .fact-label { font-size: 0.7rem; color: var(--clr-text-muted); }
    .fact-value { font-size: 0.85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .hint { font-size: 0.75rem; color: var(--clr-text-muted); line-height: 1.55; }
    @media (min-width: 1100px) {
      body { padding: 24px 40px; }
      .main-layout { flex-direction: row; align-items: flex-start; max-width: 1120px; gap: 28px; }
      .canvas-container { flex: 1 1 0; min-width: 420px; aspect-ratio: 1/1; }
      .controls { flex: 0 0 320px; max-width: 320px; }
      .control-label { width: 108px; }
    }
  </style>
</head>
<body>
<header>
  <h1>Artemis I &amp; II — 3D Trajectories</h1>
  <p>Real NASA OEM data · Earth-centred inertial frame · Bodies &amp; Moon orbit to scale</p>
</header>
<div class="main-layout">

      <div class="hl muted" style="margin-top:4px">Drag to rotate · Scroll to zoom</div>
    </div>
  </div>
  <div class="controls" id="ctrl"></div>
</div>

// ── Constants (physical, fixed) ───────────────────────────────────────────────

const SCALE   = 1 / 38440;       // scene units per km  (384 400 km → 10 units)
const EARTH_R = 6371  * SCALE;   // 0.1658
const MOON_R  = 1737  * SCALE;   // 0.0452
const D2R     = Math.PI / 180;

// ── Moon ephemeris (Meeus Ch. 47) ─────────────────────────────────────────────
// Returns position in km, EME2000 (equatorial J2000) frame.

function moonKm(jd) {
  const T  = (jd - 2451545.0) / 36525.0;
  const mod = x => ((x % 360) + 360) % 360;
  const L0 = mod(218.3164591 + 481267.88134236 * T);
  const M  = mod(134.9634114 + 477198.8676313  * T);
  const Ms = mod(357.5291092 +  35999.0502909  * T);
  const F  = mod( 93.2720993 + 483202.0175381  * T);
  const D  = mod(297.8502042 + 445267.1115168  * T);
  const s  = a => Math.sin(a * D2R), c = a => Math.cos(a * D2R);

  const dL = 6288774*s(M) + 1274027*s(2*D-M) + 658314*s(2*D) + 213618*s(2*M)
    - 185116*s(Ms) - 114332*s(2*F) + 58793*s(2*D-2*M) + 57066*s(2*D-Ms-M)
    + 53322*s(2*D+M) + 45758*s(2*D-Ms) - 40923*s(M-Ms) - 34720*s(D)
    - 30383*s(M+Ms) + 15327*s(2*D-2*F) - 12528*s(M+2*F) + 10980*s(M-2*F)
    + 10675*s(4*D-M) + 10034*s(3*M) + 8548*s(4*D-2*M) - 7888*s(2*D+Ms-M)
    - 6766*s(2*D+Ms) - 5163*s(D-M) + 4987*s(D+Ms) + 4036*s(2*D-Ms+M)
    + 3994*s(2*D+2*M) + 3861*s(4*D) + 3665*s(2*D-3*M);
  const lam = mod(L0 + dL / 1e6);

  const dB = 5128122*s(F) + 280602*s(M+F) + 277693*s(M-F) + 173237*s(2*D-F)
    + 55413*s(2*D+F-M) + 46271*s(2*D-F-M) + 32573*s(2*D+F) + 17198*s(2*M+F)
    + 9266*s(2*D+M-F) + 8822*s(2*M-F) + 8216*s(2*D-Ms-F) + 4324*s(2*D-2*M-F)
    + 4200*s(2*D+F+M) - 3359*s(2*D+Ms-F) + 2463*s(2*D-Ms+M-F) + 2211*s(2*D-Ms+F);
  const beta = dB / 1e6;

  const dR = -20905355*c(M) - 3699111*c(2*D-M) - 2955968*c(2*D) - 569925*c(2*M)
    + 48888*c(Ms) - 3149*c(2*F) + 246158*c(2*D-2*M) - 152138*c(2*D-Ms-M)
    - 170733*c(2*D+M) - 204586*c(2*D-Ms) - 129620*c(M-Ms) + 108743*c(D)
    + 104755*c(M+Ms) + 10321*c(2*D-2*F) + 79661*c(M-2*F) - 34782*c(4*D-M)
    - 23210*c(3*M) - 21636*c(4*D-2*M) + 24208*c(2*D+Ms-M) + 30824*c(2*D+Ms)
    - 8379*c(D-M) - 16675*c(D+Ms) - 12831*c(2*D-Ms+M) - 10445*c(2*D+2*M)
    - 11650*c(4*D) + 14403*c(2*D-3*M);
  const r = 385000.56 + dR / 1e3;

  const eps = (23.4392911 - 0.0130042 * T) * D2R;
  const lr = lam * D2R, br = beta * D2R;
  return {
    x: r * Math.cos(br) * Math.cos(lr),
    y: r * (Math.cos(br) * Math.sin(lr) * Math.cos(eps) - Math.sin(br) * Math.sin(eps)),
    z: r * (Math.cos(br) * Math.sin(lr) * Math.sin(eps) + Math.sin(br) * Math.cos(eps)),
  };
}

// ── Trajectory interpolation ──────────────────────────────────────────────────

let MISSION_SECS = activeMission.MISSION_DAYS * 86400;

function scPos(t_norm) {
  const pts  = activeMission.pts;
  const secs = t_norm * MISSION_SECS;
  let lo = 0, hi = pts.length - 1;
  while (lo < hi - 1) { const m = (lo + hi) >> 1; if (pts[m][0] <= secs) lo = m; else hi = m; }
  const [t0, x0, y0, z0] = pts[lo];
  const [t1, x1, y1, z1] = pts[Math.min(lo + 1, hi)];
  const f = t1 > t0 ? (secs - t0) / (t1 - t0) : 0;
  return {
    x: (x0 + f * (x1 - x0)) * SCALE,
    y: (y0 + f * (y1 - y0)) * SCALE,
    z: (z0 + f * (z1 - z0)) * SCALE,
  };
}

let fullPath = [];
let CA_IDX = 0, CA_T = 0, CA_KM = 0;

function computeMissionState() {
  const m = activeMission;
  MISSION_SECS = m.MISSION_DAYS * 86400;
  fullPath = m.pts.map(([,x,y,z]) => new THREE.Vector3(x*SCALE, y*SCALE, z*SCALE));
  let CA_DIST2 = Infinity;
  CA_IDX = 0;
  const jd_ca = m.JD0 + m.caJdOffset;
  const mc = moonKm(jd_ca);
  const mx = mc.x*SCALE, my = mc.y*SCALE, mz = mc.z*SCALE;
  for (let i = 0; i < m.pts.length; i++) {
    const [,x,y,z] = m.pts[i];
    const dx = x*SCALE-mx, dy = y*SCALE-my, dz = z*SCALE-mz;
    const d2 = dx*dx+dy*dy+dz*dz;
    if (d2 < CA_DIST2) { CA_DIST2 = d2; CA_IDX = i; }
  }
  CA_T  = m.pts[CA_IDX][0] / MISSION_SECS;
  CA_KM = Math.round(Math.sqrt(CA_DIST2) / SCALE);
}
computeMissionState();

// ── Mission phases ────────────────────────────────────────────────────────────

function phaseLabel(t) {
  for (const p of activeMission.phases) if (t >= p.t0 && t < p.t1) return p.label;
  return 'Complete';
}

// ── Simulation state ──────────────────────────────────────────────────────────

const state = { t: 0, running: true, speed: 0.6 };

// ── Three.js setup ────────────────────────────────────────────────────────────

const container = document.getElementById('ctr');
const canvas    = document.getElementById('c');
const renderer  = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
const camera = new THREE.PerspectiveCamera(42, 1, 0.001, 400);

// ── Lighting ──────────────────────────────────────────────────────────────────

scene.add(new THREE.AmbientLight(0x223355, 1.2));
const sun = new THREE.DirectionalLight(0xfff5e0, 2.8);
sun.position.set(22, 6, 8);
scene.add(sun);

// ── Stars ─────────────────────────────────────────────────────────────────────

(function () {
  const N = 2400, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    const r  = 160 + Math.random() * 30;
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.cos(ph);
    pos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.35 })));
})();

// ── Earth ─────────────────────────────────────────────────────────────────────

scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(EARTH_R, 48, 48),
  new THREE.MeshPhongMaterial({ color: 0x1a5f9e, emissive: 0x081828, shininess: 55 })
));
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(EARTH_R * 1.6, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0x4488cc, transparent: true, opacity: 0.18, side: THREE.BackSide })
));

// ── Moon mesh (moves each frame) ──────────────────────────────────────────────

const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(MOON_R, 32, 32),
  new THREE.MeshPhongMaterial({ color: 0x909090, emissive: 0x0a0a0a, shininess: 10 })
);
scene.add(moonMesh);

// ── Body labels ───────────────────────────────────────────────────────────────

function makeLabel(text, color) {
  const lc = document.createElement('canvas');
  lc.width = 256; lc.height = 56;
  const lx = lc.getContext('2d');
  lx.fillStyle = 'rgba(0,0,0,0)'; lx.fillRect(0, 0, 256, 56);
  lx.fillStyle = color;
  lx.font = '600 30px DM Sans, system-ui, sans-serif';
  lx.textAlign = 'center';
  lx.fillText(text, 128, 40);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lc), transparent: true }));
  sp.scale.set(2.2, 0.48, 1);
  return sp;
}

const earthLabel = makeLabel('Earth', '#6aacdd');
earthLabel.position.set(0, EARTH_R * 2.5 + 0.28, 0);
scene.add(earthLabel);

const moonLabel = makeLabel('Moon', '#c0c0c0');
scene.add(moonLabel);

// ── Moon orbit ring ───────────────────────────────────────────────────────────

const moonOrbitGroup = new THREE.Group();
scene.add(moonOrbitGroup);

function buildMoonOrbit(jd0) {
  while (moonOrbitGroup.children.length) {
    const obj = moonOrbitGroup.children[0];
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
    moonOrbitGroup.remove(obj);
  }
  const N = 200, T_MONTH = 27.3217;
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const jd = jd0 - T_MONTH / 2 + (i / N) * T_MONTH;
    const m  = moonKm(jd);
    pts.push(new THREE.Vector3(m.x * SCALE, m.y * SCALE, m.z * SCALE));
  }
  moonOrbitGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x6688aa, transparent: true, opacity: 0.50 })
  ));
  const arrowMat = new THREE.MeshBasicMaterial({ color: 0x6688aa });
  for (const qi of [Math.floor(N / 4), Math.floor(3 * N / 4)]) {
    const pa = pts[qi - 1], pb = pts[qi + 1];
    const dir = new THREE.Vector3().subVectors(pb, pa).normalize();
    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.55, 8), arrowMat);
    cone.position.copy(pts[qi]);
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    moonOrbitGroup.add(cone);
  }
  const lc = document.createElement('canvas');
  lc.width = 320; lc.height = 56;
  const lx = lc.getContext('2d');
  lx.fillStyle = 'rgba(0,0,0,0)'; lx.fillRect(0, 0, 320, 56);
  lx.fillStyle = '#8aaabf';
  lx.font = '500 28px DM Sans, system-ui, sans-serif';
  lx.textAlign = 'center'; lx.fillText("Moon's orbit", 160, 40);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lc), transparent: true, opacity: 0.85 }));
  sp.scale.set(3.2, 0.56, 1);
  const topPt = pts[Math.floor(N * 0.3)];
  sp.position.set(topPt.x * 0.85, topPt.y + 0.6, topPt.z * 0.85);
  moonOrbitGroup.add(sp);
}

// ── Trajectory preview line (rebuilt on mission switch) ───────────────────────

let trajLineMesh = null;
let trailMat     = null;

function buildTrajLine() {
  if (trajLineMesh) scene.remove(trajLineMesh);
  trajLineMesh = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(fullPath),
    new THREE.LineBasicMaterial({ color: activeMission.color, transparent: true, opacity: 0.20 })
  );
  scene.add(trajLineMesh);
  if (trailLine) trailLine.material.color.setHex(activeMission.color);
}

// ── Animated trail ───────────────────────────────────────────────────────────

const MAX_TRAIL = 420;
const trailPos = new Float32Array(MAX_TRAIL * 3);
const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
trailGeo.setDrawRange(0, 0);
trailMat = new THREE.LineBasicMaterial({ color: activeMission.color });
const trailLine = new THREE.Line(trailGeo, trailMat);
scene.add(trailLine);

// ── Spacecraft marker ─────────────────────────────────────────────────────────

const scMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.018, 12, 12),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
scene.add(scMesh);

const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0xffffff, transparent: true, opacity: 0.40 }));
glowSprite.scale.set(0.16, 0.16, 1);
scene.add(glowSprite);

// ── Closest-approach marker ───────────────────────────────────────────────────

const caMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.020, 12, 12),
  new THREE.MeshBasicMaterial({ color: 0xffaa40, transparent: true, opacity: 0 })
);
scene.add(caMarker);

// ── Camera orbit controls ─────────────────────────────────────────────────────

let camTheta = 0.4, camPhi = 1.0, camRadius = 18;
let dragging = false, lastMX = 0, lastMY = 0;
const camPivot = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  const sp = Math.sin(camPhi), cp = Math.cos(camPhi);
  const st = Math.sin(camTheta), ct = Math.cos(camTheta);
  camera.position.set(camPivot.x + camRadius*sp*ct, camPivot.y + camRadius*cp, camPivot.z + camRadius*sp*st);
  camera.lookAt(camPivot);
}
canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta -= (e.clientX - lastMX) * 0.006;
  camPhi    = Math.max(0.05, Math.min(Math.PI - 0.05, camPhi + (e.clientY - lastMY) * 0.006));
  lastMX = e.clientX; lastMY = e.clientY;
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  camRadius = Math.max(0.5, Math.min(50, camRadius + e.deltaY * 0.022));
  updateCamera(); e.preventDefault();
}, { passive: false });
let lastTouch = null;
canvas.addEventListener('touchstart', e => { lastTouch = e.touches[0]; e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (!lastTouch) return;
  const t = e.touches[0];
  camTheta -= (t.clientX - lastTouch.clientX) * 0.006;
  camPhi    = Math.max(0.05, Math.min(Math.PI - 0.05, camPhi + (t.clientY - lastTouch.clientY) * 0.006));
  lastTouch = t; updateCamera(); e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { lastTouch = null; });

// ── Resize ────────────────────────────────────────────────────────────────────

function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ── HUD ───────────────────────────────────────────────────────────────────────

const hudDay   = document.getElementById('hud-day');
const hudPhase = document.getElementById('hud-phase');
const hudDist  = document.getElementById('hud-dist');
const hudCa    = document.getElementById('hud-ca');

function updateHUD(moonVec) {
  const day = state.t * activeMission.MISSION_DAYS;
  hudDay.textContent = `Day ${day.toFixed(2)} / ${activeMission.MISSION_DAYS.toFixed(2)}`;
  hudPhase.textContent = phaseLabel(state.t);
  const sc   = scPos(state.t);
  const dx   = sc.x - moonVec.x, dy = sc.y - moonVec.y, dz = sc.z - moonVec.z;
  const distKm = Math.round(Math.sqrt(dx*dx + dy*dy + dz*dz) / SCALE);
  hudDist.textContent = `${distKm.toLocaleString()} km from Moon`;
  const nearCA = Math.abs(state.t - CA_T) < 0.015;
  hudCa.style.display = nearCA ? '' : 'none';
  hudDay.className = nearCA ? 'hl warning' : 'hl accent';
}

// ── Update loop ───────────────────────────────────────────────────────────────

function update(dt) {
  if (!state.running || state.t >= 1) return;
  state.t = Math.min(1, state.t + dt * state.speed / activeMission.MISSION_DAYS);

  const jd   = activeMission.JD0 + state.t * activeMission.MISSION_DAYS;
  const mKm  = moonKm(jd);
  const mVec = new THREE.Vector3(mKm.x * SCALE, mKm.y * SCALE, mKm.z * SCALE);
  moonMesh.position.copy(mVec);
  moonLabel.position.set(mVec.x, mVec.y + MOON_R * 2.5 + 0.28, mVec.z);

  const ca_sc = scPos(CA_T);
  caMarker.position.set(ca_sc.x, ca_sc.y, ca_sc.z);
  caMarker.material.opacity = Math.abs(state.t - CA_T) < 0.015 ? 0.85 : 0;

  const sc = scPos(state.t);
  scMesh.position.set(sc.x, sc.y, sc.z);
  glowSprite.position.set(sc.x, sc.y, sc.z);

  const pts    = activeMission.pts;
  const endIdx = Math.min(Math.floor(state.t * (pts.length - 1)), pts.length - 1);
  for (let i = 0; i <= endIdx; i++) {
    const p = fullPath[i];
    trailPos[i*3] = p.x; trailPos[i*3+1] = p.y; trailPos[i*3+2] = p.z;
  }
  trailGeo.setDrawRange(0, endIdx + 1);
  trailGeo.attributes.position.needsUpdate = true;

  updateHUD(mVec);
}

// ── Render loop ───────────────────────────────────────────────────────────────

let lastT = null;
function frame(t) {
  if (lastT === null) lastT = t;
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

// ── Mission switch ────────────────────────────────────────────────────────────

function switchMission(id) {
  activeMission = MISSIONS_DATA[id];
  computeMissionState();
  buildMoonOrbit(activeMission.JD0);
  buildTrajLine();
  trailGeo.setDrawRange(0, 0);
  state.t = 0; state.running = true;
  if (playBtn) playBtn.textContent = 'Pause';
  const m0 = moonKm(activeMission.JD0);
  moonMesh.position.set(m0.x * SCALE, m0.y * SCALE, m0.z * SCALE);
  moonLabel.position.set(m0.x * SCALE, m0.y * SCALE + MOON_R * 2.5 + 0.28, m0.z * SCALE);
  buildControls();
}

// ── Controls ──────────────────────────────────────────────────────────────────

let playBtn = null;

function buildControls() {
  const panel = document.getElementById('ctrl');
  panel.innerHTML = '';

  // Mission selector
  addSection(panel, 'Mission');
  const mRow = document.createElement('div'); mRow.className = 'btn-row';
  for (const [id, m] of Object.entries(MISSIONS_DATA)) {
    const btn = document.createElement('button'); btn.textContent = m.name;
    if (activeMission.id === id) btn.classList.add('active');
    btn.addEventListener('click', () => switchMission(id));
    mRow.appendChild(btn);
  }
  panel.appendChild(mRow);

  // Mission facts
  addSection(panel, 'Mission data');
  const f = activeMission.facts;
  const grid = document.createElement('div'); grid.className = 'fact-grid';
  grid.innerHTML = `
    <div class="fact"><span class="fact-label">Launch</span><span class="fact-value">${f.Launch}</span></div>
    <div class="fact"><span class="fact-label">Duration</span><span class="fact-value">${activeMission.MISSION_DAYS.toFixed(2)} days</span></div>
    <div class="fact"><span class="fact-label">Closest approach</span><span class="fact-value">${CA_KM.toLocaleString()} km</span></div>
    <div class="fact"><span class="fact-label">Profile</span><span class="fact-value">${f.Profile}</span></div>
    <div class="fact"><span class="fact-label">Crew</span><span class="fact-value">${f.Crew}</span></div>
  `;
  panel.appendChild(grid);

  // Playback
  addSection(panel, 'Playback');
  addSlider(panel, 'Speed', 'd/s', 0.1, 10, 0.1, state.speed, v => { state.speed = v; });
  const btnRow1 = document.createElement('div'); btnRow1.className = 'btn-row';
  playBtn = document.createElement('button'); playBtn.textContent = 'Pause'; playBtn.style.flex = '1';
  playBtn.addEventListener('click', () => { state.running = !state.running; playBtn.textContent = state.running ? 'Pause' : 'Play'; });
  const resetBtn = document.createElement('button'); resetBtn.textContent = 'Reset'; resetBtn.style.flex = '1';
  resetBtn.addEventListener('click', () => {
    state.t = 0; state.running = true; playBtn.textContent = 'Pause';
    trailGeo.setDrawRange(0, 0);
  });
  const caBtn = document.createElement('button'); caBtn.textContent = 'Jump → flyby'; caBtn.style.flex = '1';
  caBtn.addEventListener('click', () => { state.t = Math.max(0, CA_T - 0.02); state.running = true; playBtn.textContent = 'Pause'; });
  btnRow1.append(playBtn, resetBtn); panel.appendChild(btnRow1);
  const btnRow2 = document.createElement('div'); btnRow2.className = 'btn-row';
  btnRow2.appendChild(caBtn); panel.appendChild(btnRow2);

  // Camera
  addSection(panel, 'Camera');
  const camRow = document.createElement('div'); camRow.className = 'btn-row';
  const cams = [
    { label: 'Wide',       th: 0.40, ph: 1.00, r: 18  },
    { label: 'Near Earth', th: 0.40, ph: 1.00, r: 2.0 },
    { label: 'Top',        th: 0,    ph: 0.06, r: 18  },
    { label: 'Side',       th: 1.57, ph: 1.57, r: 18  },
  ];
  for (const c of cams) {
    const btn = document.createElement('button'); btn.textContent = c.label;
    btn.addEventListener('click', () => { camTheta = c.th; camPhi = c.ph; camRadius = c.r; updateCamera(); });
    camRow.appendChild(btn);
  }
  panel.appendChild(camRow);

  const hint = document.createElement('p'); hint.className = 'hint';
  hint.textContent = 'Real NASA OEM trajectory data (EME2000 frame). '
    + (activeMission.id === 'a2'
      ? 'First ~21 hours: parking orbit; TLI burn launches toward Moon. "Near Earth" shows the orbit shape.'
      : 'Data starts at ICPS/Orion separation (post-TLI). The spacecraft loops in a large retrograde orbit beyond the Moon before returning.');
  panel.appendChild(hint);
}

function addSection(panel, title) {
  const el = document.createElement('div'); el.className = 'section-label'; el.textContent = title; panel.appendChild(el);
}
function addSlider(panel, label, unit, min, max, step, value, onInput) {
  const row = document.createElement('div'); row.className = 'control-row';
  row.innerHTML = `<span class="control-label">${label}</span>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${value}">
    <span class="control-value">${value.toFixed(1)} ${unit}</span>`;
  const slider = row.querySelector('input'), readout = row.querySelector('.control-value');
  slider.addEventListener('input', e => { const v = Number(e.target.value); readout.textContent = `${v.toFixed(1)} ${unit}`; onInput(v); });
  panel.appendChild(row);
}

// ── Init ──────────────────────────────────────────────────────────────────────

window.addEventListener('load', () => {
  resize(); updateCamera();
  buildMoonOrbit(activeMission.JD0);
  buildTrajLine();
  buildControls();
  const m0 = moonKm(activeMission.JD0);
  moonMesh.position.set(m0.x * SCALE, m0.y * SCALE, m0.z * SCALE);
  moonLabel.position.set(m0.x * SCALE, m0.y * SCALE + MOON_R * 2.5 + 0.28, m0.z * SCALE);
  requestAnimationFrame(frame);
});
</script>
</body>
</html>
