<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angular Dynamics — Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-bg: #f8f9fa;
      --clr-surface: #ffffff;
      --clr-text: #1f2937;
      --clr-text-muted: #6b7280;
      --clr-accent: #2d7d9a;
      --clr-accent-light: #d4eef4;
      --clr-border: #e2e8f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --clr-bg: #2e3440;
        --clr-surface: #3b4252;
        --clr-text: #eceff4;
        --clr-text-muted: #d0d8e4;
        --clr-accent: #5fb3d4;
        --clr-accent-light: #2a4558;
        --clr-border: #4c566a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--clr-bg);
      color: var(--clr-text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    header { text-align: center; }
    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.03em; }
    header p  { font-size: 0.85rem; color: var(--clr-text-muted); margin-top: 4px; }

    nav.tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 720px;
    }
    nav.tabs button {
      padding: 8px 14px;
      border: 1px solid var(--clr-accent);
      border-radius: 6px;
      background: transparent;
      color: var(--clr-text);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    nav.tabs button:hover  { background: var(--clr-accent-light); }
    nav.tabs button.active { background: var(--clr-accent); color: #fff; }

    .main-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 720px;
    }

    .canvas-container {
      position: relative;
      width: 100%;
      max-width: 720px;
      aspect-ratio: 1 / 1;
    }

    /* Canvas stays dark in both themes — same visual language as the 3D sim. */
    #canvas2d {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 8px;
      background: #0f1117;
    }

    .controls {
      width: 100%;
      max-width: 720px;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .control-label {
      font-size: 0.8rem;
      color: var(--clr-text-muted);
      width: 130px;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      accent-color: var(--clr-accent);
      cursor: pointer;
    }
    select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--clr-border);
      border-radius: 6px;
      background: var(--clr-bg);
      color: var(--clr-text);
      font-family: inherit;
      font-size: 0.85rem;
    }

    .control-value {
      font-size: 0.8rem;
      color: var(--clr-text);
      width: 80px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    button {
      padding: 8px 20px;
      border: 1px solid var(--clr-accent);
      border-radius: 6px;
      background: transparent;
      color: var(--clr-text);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    button:hover  { background: var(--clr-accent-light); }
    button.active { background: var(--clr-accent); color: #fff; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--clr-text-muted);
      padding-bottom: 2px;
      border-bottom: 1px solid var(--clr-border);
    }

    .control-row.r-row .control-label { color: var(--clr-text); font-weight: 600; }
    input[type=range].primary { accent-color: #ffaa40; }

    .hint {
      font-size: 0.75rem;
      color: var(--clr-text-muted);
      text-align: center;
      white-space: pre-line;
      line-height: 1.5;
    }

    @media (min-width: 1100px) {
      body { padding: 24px 40px; }
      .main-layout {
        flex-direction: row;
        align-items: flex-start;
        max-width: 1080px;
        gap: 28px;
      }
      .canvas-container { flex: 1 1 0; max-width: 700px; min-width: 420px; }
      .controls { flex: 0 0 320px; max-width: 320px; padding: 18px; }
      .control-label { width: 116px; }
      .control-value { width: 70px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Angular Dynamics Simulator</h1>
  <p>Angular momentum · moment of inertia · torque · ocean-gyre integration</p>
</header>

<nav class="tabs" id="tabs">
  <button data-mod="m1" class="active">1 — Angular momentum</button>
  <button data-mod="m2">2 — Moment of inertia</button>
  <button data-mod="m3">3 — Torque</button>
  <button data-mod="m4">4 — Ocean gyre</button>
</nav>

<div class="main-layout">

  <div class="canvas-container">
    <canvas id="canvas2d"></canvas>
  </div>

  <div class="controls" id="controls"></div>

</div>

<script src="physics.js"></script>
<script src="module1.js"></script>
<script src="module2.js"></script>
<script src="module3.js"></script>
<script src="integrated.js"></script>
<script>
(function () {
  const canvas = document.getElementById('canvas2d');
  const ctx    = canvas.getContext('2d');
  const tabs   = document.getElementById('tabs');
  const panel  = document.getElementById('controls');

  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.round(rect.width);
    canvas.height = Math.round(rect.height);
  }

  const modules = {
    m1: new AM.Module1(),
    m2: new AM.Module2(),
    m3: new AM.Module3(),
    m4: new AM.Module4(),
  };
  let active = modules.m1;

  function activate(key) {
    active = modules[key];
    active.init(ctx);
    active.buildControls(panel);
    for (const btn of tabs.querySelectorAll('button')) {
      btn.classList.toggle('active', btn.dataset.mod === key);
    }
  }

  tabs.addEventListener('click', e => {
    const btn = e.target.closest('button[data-mod]');
    if (btn) activate(btn.dataset.mod);
  });

  let lastT = null;
  function frame(t) {
    if (lastT === null) lastT = t;
    const dt = Math.min((t - lastT) / 1000, 0.05);
    lastT = t;
    active.update(dt);
    active.render();
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  activate('m1');
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
